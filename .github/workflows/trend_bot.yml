name: Trend Bot - Analiz

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repoyu indir
        uses: actions/checkout@v4
      
      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Kütüphaneleri yükle
        run: |
          pip install requests pandas openpyxl
      
      - name: 🔍 Dizin yapısını göster (öncesi)
        run: |
          echo "=== Çalışma dizini ==="
          pwd
          ls -la
          echo "=== bot klasörü ==="
          ls -la bot/ 2>/dev/null || echo "bot klasörü yok"
      
      - name: 🤖 Botu çalıştır
        run: |
          cd bot
          python data_fetcher.py
          echo "=== Bot çalıştı, çıktılar ==="
          ls -la *.xlsx *.json 2>/dev/null || echo "Hiç çıktı dosyası bulunamadı"
      
      - name: 📤 Tüm çıktıları yükle
        uses: actions/upload-artifact@v4
        with:
          name: trend-bot-ciktilari
          path: |
            bot/*.xlsx
            bot/*.json
            bot/*.log
          retention-days: 30
      
      - name: 📊 Çıktı listesi (sonrası)
        run: |
          echo "=== bot klasöründeki tüm dosyalar ==="
          ls -la bot/
