name: Trend Bot - LSTM

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Kütüphaneleri yükle
        run: |
          pip install yfinance pandas numpy openpyxl scikit-learn tensorflow
      
      - name: Botu çalıştır
        run: |
          cd bot
          python main.py
      
      - name: Çıktıları kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veri/
          git commit -m "🤖 LSTM tahminleri - $(date -u '+%Y-%m-%d')" || echo "Değişiklik yok"
          git push
