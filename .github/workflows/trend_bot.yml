name: Trend Bot - LSTM (15 Coin)

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Kütüphaneleri yükle
        run: |
          pip install yfinance pandas numpy openpyxl scikit-learn tensorflow
      
      - name: Botu çalıştır (LSTM - 15 Coin)
        run: |
          cd bot
          python data_fetcher.py
      
      - name: Çıktıları repoya kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veri/
          git commit -m "🤖 LSTM tahminleri (15 coin) - $(date -u '+%Y-%m-%d %H:%M')" || echo "Değişiklik yok"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
