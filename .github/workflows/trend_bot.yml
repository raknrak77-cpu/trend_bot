name: Trend Bot - LSTM

on:
  workflow_dispatch:

# KRİTİK: Yazma izni ver
permissions:
  contents: write
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Repoyu indir
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 📦 Kütüphaneleri yükle
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl scikit-learn tensorflow
      
      - name: 🔍 Dizin kontrolü
        run: |
          echo "=== bot dizini içeriği ==="
          ls -la bot/ || echo "bot dizini yok"
      
      - name: 🤖 Botu çalıştır (debug mod)
        run: |
          cd bot
          python -u main.py 2>&1 | tee bot.log
      
      - name: 📊 Çıktıları kontrol et
        run: |
          echo "=== bot/veri klasörü ==="
          ls -la bot/veri/ 2>/dev/null || echo "bot/veri yok"
          
          # main.py çıktıyı nereye yazdı?
          echo "=== ana dizinde veri klasörü ==="
          ls -la veri/ 2>/dev/null || echo "ana veri yok"
          
          echo "=== bot klasöründeki xlsx dosyaları ==="
          ls -la bot/*.xlsx 2>/dev/null || echo "xlsx yok"
      
      - name: 💾 Çıktıları ana dizine taşı ve repoya kaydet
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H-%M-%S')
          
          # Ana dizinde veri klasörünü oluştur
          mkdir -p "veri/${TIMESTAMP}"
          mkdir -p "veri/latest"
          
          # Çıktıları nereden alacağız?
          # Önce bot/veri klasöründen dene
          if [ -d "bot/veri" ] && [ "$(ls -A bot/veri)" ]; then
            echo "📁 bot/veri/ bulundu, kopyalanıyor..."
            cp -r bot/veri/* "veri/${TIMESTAMP}/" 2>/dev/null || true
            cp -r bot/veri/* "veri/latest/" 2>/dev/null || true
          fi
          
          # Alternatif: bot klasöründen dene
          if [ -f "bot/tahminler.xlsx" ]; then
            echo "📁 bot/tahminler.xlsx bulundu"
            cp bot/tahminler.xlsx "veri/${TIMESTAMP}/" 2>/dev/null || true
            cp bot/tahminler.xlsx "veri/latest/" 2>/dev/null || true
          fi
          
          if [ -f "bot/tahminler.json" ]; then
            cp bot/tahminler.json "veri/${TIMESTAMP}/" 2>/dev/null || true
            cp bot/tahminler.json "veri/latest/" 2>/dev/null || true
          fi
          
          # Alternatif: ana dizindeki veri klasöründen dene
          if [ -f "veri/tahminler.xlsx" ]; then
            echo "📁 veri/tahminler.xlsx bulundu"
            cp veri/tahminler.xlsx "veri/${TIMESTAMP}/" 2>/dev/null || true
            cp veri/tahminler.xlsx "veri/latest/" 2>/dev/null || true
            cp veri/tahminler.json "veri/${TIMESTAMP}/" 2>/dev/null || true
            cp veri/tahminler.json "veri/latest/" 2>/dev/null || true
          fi
          
          # Debug log'u da kaydet
          if [ -f "bot/bot.log" ]; then
            cp bot/bot.log "veri/${TIMESTAMP}/" 2>/dev/null || true
          fi
          
          # Git'e ekle
          git add veri/ --force
          
          # Değişiklik varsa commit et
          if git diff --staged --quiet; then
            echo "⚠️ Değişiklik yok, commit atlanıyor"
          else
            git commit -m "🤖 LSTM tahminleri - ${TIMESTAMP}"
            git push origin main
            echo "✅ Repo güncellendi"
          fi
      
      - name: 📤 Artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: trend-bot-cikti-${{ github.run_id }}
          path: |
            bot/veri/
            bot/tahminler.xlsx
            bot/tahminler.json
            veri/
            bot/bot.log
          retention-days: 30
      
      - name: 📊 Sonuç özeti
        run: |
          echo ""
          echo "=========================================="
          echo "✅ TREND BOT İŞLEMİ TAMAMLANDI"
          echo "=========================================="
          echo "📁 Çıktılar:"
          echo "   - Artifact olarak indirebilirsiniz"
          echo "   - Repoda veri/ klasöründe (başarılı push olduysa)"
          echo "=========================================="
