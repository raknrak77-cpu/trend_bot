name: Trend Bot - Saatlik Veri Analizi

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Kütüphaneleri yükle
        run: |
          pip install requests pandas openpyxl
      
      - name: Botu çalıştır
        run: |
          cd bot
          python data_fetcher.py
      
      - name: Çıktıları yükle
        uses: actions/upload-artifact@v4
        with:
          name: trend-bot-analiz
          path: |
            bot/analiz_ciktisi/*.xlsx
            bot/analiz_ciktisi/*.json
          retention-days: 30
