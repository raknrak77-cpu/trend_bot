name: Trend Bot

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4
      
      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Kütüphaneleri yükle
        run: |
          pip install yfinance pandas openpyxl scikit-learn
      
      - name: Tarih/saat değişkenini oluştur
        id: datetime
        run: |
          echo "TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')" >> $GITHUB_ENV
          echo "FOLDER_NAME=$(date -u '+%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV
      
      - name: Botu çalıştır
        run: |
          cd bot
          python data_fetcher.py
        env:
          RUN_TIMESTAMP: ${{ env.FOLDER_NAME }}
      
      - name: Çıktıları ana dizine taşı
        run: |
          # Ana dizinde veri klasörü oluştur (yoksa)
          mkdir -p "veri/${{ env.FOLDER_NAME }}"
          
          # bot/veri klasöründeki tüm dosyaları ana dizindeki tarihli klasöre taşı
          if [ -d "bot/veri" ]; then
            mv bot/veri/*.xlsx bot/veri/*.json "veri/${{ env.FOLDER_NAME }}/" 2>/dev/null || true
            echo "✅ Dosyalar ana dizine taşındı: veri/${{ env.FOLDER_NAME }}/"
          fi
          
          # Ayrıca en son çalışmanın kopyasını "latest" klasörüne al
          mkdir -p "veri/latest"
          cp -r "veri/${{ env.FOLDER_NAME }}"/* "veri/latest/" 2>/dev/null || true
      
      - name: Repoya kaydet ve pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add veri/
          git commit -m "🤖 Bot çıktıları - ${{ env.FOLDER_NAME }}" || echo "Değişiklik yok"
          git push
